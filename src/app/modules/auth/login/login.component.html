<div style="min-height:100vh;display:grid;place-items:center;padding:20px;background:var(--bg)">
  <div class="card" style="width:100%;max-width:400px;box-shadow:var(--sh3)">
    <div style="padding:30px 28px 26px">
      <div class="brand" style="padding:0 0 20px;justify-content:center">
        <div class="brand-mark"><app-icon name="cube" [size]="21"></app-icon></div>
        <div>
          <div class="brand-name">TechVentures</div>
          <div class="brand-sub">ERP · RRHH Integral</div>
        </div>
      </div>

      <h1 style="font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px">Bienvenido</h1>
      <p style="font-size:13px;color:var(--tx3);margin-bottom:22px">Inicia sesión para acceder al panel</p>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="ff" style="margin-bottom:14px">
          <label>Usuario</label>
          <input type="text" formControlName="username" placeholder="admin" autocomplete="username" />
        </div>
        <div class="ff" style="margin-bottom:18px">
          <label>Contraseña</label>
          <input type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <div *ngIf="error" class="bst bbd" style="width:100%;justify-content:flex-start;margin-bottom:14px;border-radius:10px;padding:10px 12px">
          <span class="bd2"></span>{{ error }}
        </div>

        <button type="submit" class="btn pri" style="width:100%;justify-content:center" [disabled]="loading || form.invalid">
          <span *ngIf="!loading">Entrar</span>
          <span *ngIf="loading">Verificando…</span>
        </button>
      </form>

      <p style="font-size:11.5px;color:var(--tx3);text-align:center;margin-top:16px">
        Demo: <b>admin</b> / <b>password123</b>
      </p>
    </div>
  </div>
</div>
